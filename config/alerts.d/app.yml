# ============================================================================
# Application alert rules — Sentinel Stack
# Generic HTTP-service signals. Adjust thresholds and the `job`/labels to match
# your prometheus.yml. Works with Spring Actuator / Micrometer metric names.
# ============================================================================
groups:
  - name: app-alerts
    rules:

      - alert: AppDown
        expr: up{job="app"} == 0
        for: 30s
        labels: { severity: critical }
        annotations:
          summary: "Service is down ({{ $labels.service }})"
          description: "Target {{ $labels.instance }} is not responding (up=0)."

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket{job="app"}[5m]))) > 1
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: "High p95 latency"
          description: "p95 latency is {{ $value | humanizeDuration }} over the last 5m."

      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{job="app", status=~"5.."}[5m]))
          /
          sum(rate(http_server_requests_seconds_count{job="app"}[5m])) > 0.1
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "High 5xx error rate"
          description: "More than 10% of responses are 5xx (current: {{ $value | humanizePercentage }})."
